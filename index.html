<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>NutriRuta — Tu ruta hacia hábitos saludables</title>
  <meta name="description" content="PWA de hábitos saludables y nutrición personalizada: hígado graso, resistencia a la insulina, prediabetes, colon irritable, migrañas, candidiasis y salud cardiovascular.">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://esm.sh; connect-src 'self' https://rlcnxhykwfeasehmuhqe.supabase.co https://esm.sh; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; manifest-src 'self'; base-uri 'self'; form-action 'self'; object-src 'none'; frame-ancestors 'none'">
  <meta name="theme-color" content="#2BB5A0">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" type="image/svg+xml" href="./icons/icon.svg">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="stylesheet" href="./css/styles.css">
  <style>
    /* Splash de arranque: vive solo hasta el primer render del router
       (navigate() vacía #app). Inline para pintar sin esperar nada. */
    .boot-logo { width: 88px; height: 88px; animation: boot-pop .5s cubic-bezier(.34,1.56,.64,1) both; }
    .boot-route { width: 200px; height: 36px; margin-top: 4px; }
    .boot-route .tr { stroke: #DCF3EF; }
    .boot-route .dr { stroke: #2BB5A0; stroke-dasharray: 100; animation: boot-draw 1.7s ease-in-out infinite; }
    @keyframes boot-pop { from { transform: scale(.6); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    @keyframes boot-draw { 0% { stroke-dashoffset: 100; } 55%, 70% { stroke-dashoffset: 0; } 100% { stroke-dashoffset: -100; } }
    @media (prefers-reduced-motion: reduce) { .boot-logo, .boot-route .dr { animation: none; } }
  </style>
</head>
<body>
  <div id="app" aria-live="polite">
    <div class="splash">
      <svg class="boot-logo" viewBox="0 0 512 512" aria-hidden="true"><defs><linearGradient id="nrleaf" x1="0" y1="0" x2="0.4" y2="1"><stop offset="0" stop-color="#7CC96A"/><stop offset="1" stop-color="#3E9E52"/></linearGradient></defs><rect width="512" height="512" rx="112" fill="#2BB5A0"/><g fill="none" stroke="#FFFFFF" stroke-opacity="0.28" stroke-width="13"><ellipse cx="256" cy="396" rx="148" ry="36"/><ellipse cx="256" cy="396" rx="86" ry="21"/></g><path d="M256 68 C168 68 100 136 100 222 C100 316 202 398 256 434 C310 398 412 316 412 222 C412 136 344 68 256 68 Z" fill="none" stroke="#FFFFFF" stroke-width="30" stroke-linejoin="round"/><g transform="translate(252 210) scale(0.55) translate(-256 -288)"><path d="M256 416c-72-48-136-102-136-176 0-45 34-80 78-80 28 0 48 13 58 32 10-19 30-32 58-32 44 0 78 35 78 80 0 74-64 128-136 176z" fill="#FFFFFF"/></g><g transform="translate(288 210) rotate(35)"><path d="M0 -40 C26 -24 28 10 0 40 C-28 10 -26 -24 0 -40 Z" fill="url(#nrleaf)"/><path d="M0 36 L-9 60" stroke="#3E9E52" stroke-width="7" stroke-linecap="round" fill="none"/><path d="M0 -30 L0 32 M0 -16 L13 -25 M0 -16 L-13 -25 M0 2 L15 -7 M0 2 L-15 -7 M0 18 L12 9 M0 18 L-12 9" stroke="#FFFFFF" stroke-width="3.5" fill="none" stroke-linecap="round"/></g></svg>
      <h1>NutriRuta</h1>
      <svg class="boot-route" viewBox="0 0 204 36" aria-hidden="true" fill="none" stroke-width="5" stroke-linecap="round">
        <path class="tr" d="M8 28 C 56 28 56 8 102 8 C 148 8 148 28 196 28"/>
        <path class="dr" d="M8 28 C 56 28 56 8 102 8 C 148 8 148 28 196 28" pathLength="100"/>
      </svg>
    </div>
  </div>

  <nav id="bottom-nav" class="bottom-nav hidden" aria-label="Navegación principal">
    <button data-route="dashboard" class="nav-btn" aria-label="Hoy"><span class="nav-icon">🏠</span><span>Hoy</span></button>
    <button data-route="planner" class="nav-btn" aria-label="Recetas"><span class="nav-icon">🥗</span><span>Recetas</span></button>
    <button data-route="sos" class="nav-btn nav-sos" aria-label="SOS antojo"><span class="nav-icon">💚</span><span>SOS</span></button>
    <button data-route="progress" class="nav-btn" aria-label="Progreso"><span class="nav-icon">📈</span><span>Progreso</span></button>
    <button data-route="learn" class="nav-btn" aria-label="Aprende"><span class="nav-icon">📚</span><span>Aprende</span></button>
  </nav>

  <div id="toast" class="toast hidden" role="status"></div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
